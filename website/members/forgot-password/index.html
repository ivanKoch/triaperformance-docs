<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña — Triaperformance</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --blue: #004aad; --blue-deep: #003a89; --ink: #1e2019;
    --white: #fff; --wash: #edf3fb; --slate: #565a52; --mist: #e4e6e1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--wash); color: var(--ink);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .card {
    background: var(--white); border-radius: 8px; padding: 40px;
    max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .card h1 { font-size: 22px; margin: 0 0 8px; }
  .card p.sub { color: var(--slate); font-size: 14px; margin: 0 0 24px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  input[type="email"] {
    width: 100%; border: 1px solid var(--mist); border-radius: 4px;
    padding: 12px 14px; font-size: 16px; font-family: inherit; margin-bottom: 16px;
  }
  input[type="email"]:focus { outline: none; border-color: var(--blue); }
  button {
    width: 100%; background: var(--blue); color: var(--white); border: none;
    border-radius: 4px; padding: 12px; font-size: 16px; cursor: pointer;
  }
  button:hover { background: var(--blue-deep); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .result {
    background: var(--wash); color: var(--ink); font-size: 14px; border-radius: 4px;
    padding: 10px 14px; margin-top: 16px; display: none;
  }
  .result.show { display: block; }
  .help { text-align: center; font-size: 13px; color: var(--slate); margin-top: 20px; }
  .help a { color: var(--blue); }
</style>
</head>
<body>

<div class="card">
  <h1>Recuperar contraseña</h1>
  <p class="sub" id="sub">Ingresá el email con el que te suscribiste a All-Access. Si está registrado, te enviamos la contraseña.</p>

  <form id="forgot-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email">
    <button type="submit" id="submit-btn">Enviar</button>
  </form>

  <p class="result" id="result"></p>

  <p class="help"><a href="/members/login">Volver al login</a></p>
</div>

<script>
  var form = document.getElementById('forgot-form');
  var sub = document.getElementById('sub');
  var result = document.getElementById('result');
  var submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';

    fetch('/members/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value.trim() })
    })
      .then(function () {
        result.textContent = 'Si el email está registrado, te enviamos la contraseña. Revisá tu bandeja de entrada.';
        result.classList.add('show');
        form.style.display = 'none';
        sub.style.display = 'none';
      })
      .catch(function () {
        result.textContent = 'Algo salió mal. Escribinos a coach@triaperformance.com.';
        result.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enviar';
      });
  });
</script>

</body>
</html>
