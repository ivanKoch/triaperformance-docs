# analytics-postgres publishes to 127.0.0.1:5432 on the HOST (loopback only,
# deliberately not reachable from other containers via the docker bridge). A
# normal bridge-networked container can't reach that -- 127.0.0.1 inside a
# container means the container's own loopback, not the host's. Using
# network_mode: host instead: the container shares the host's network
# namespace directly, so 127.0.0.1 means the same thing inside and out.
#
# This also means `ports:` is not used/needed -- with host networking the app
# binds directly to the host's 127.0.0.1:8091 (see the Dockerfile CMD), same
# effective result as the port-publish approach but compatible with how
# analytics-postgres is locked down.

services:
  members-auth:
    build: ./auth_service
    restart: unless-stopped
    network_mode: host
    environment:
      MEMBERS_DB_DSN: "host=127.0.0.1 port=5432 dbname=members user=analytics password=CHANGE_ME"
